# =============================================================================
# Arquivo: apisix_conf/apisix.yaml
# Rotas do APISIX em modo standalone.
#
# REGRAS OBRIGATÓRIAS:
#   1. O arquivo DEVE terminar com "#END"
#   2. Hot-reload automático a cada 1s
#
# Healthcheck local (Docker):  GET http://localhost:7085/status
# Healthcheck Render (9080):   GET http://localhost:9080/health
# =============================================================================

routes:
  # ---------------------------------------------------------------------------
  # /health — healthcheck que o Render.com verifica (porta 9080)
  # serverless-pre-function intercepta a requisição antes de chegar ao upstream
  # ---------------------------------------------------------------------------
  - uri: /health
    name: healthcheck-render
    methods: [GET, HEAD]
    upstream_id: upstream-local
    plugins:
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              ngx.status = 200
              ngx.header["Content-Type"] = "application/json"
              ngx.say('{"status":"ok"}')
              ngx.exit(200)
            end
 
  # ---------------------------------------------------------------------------
  # / (raiz) — resposta 200 para evitar 404 no HEAD / do Render na inicialização
  # ---------------------------------------------------------------------------
  - uri: /
    name: root-redirect
    methods: [GET, HEAD]
    upstream_id: upstream-local
    plugins:
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              ngx.status = 200
              ngx.header["Content-Type"] = "application/json"
              ngx.say('{"gateway":"APISIX","status":"running"}')
              ngx.exit(200)
            end
 
  # ---------------------------------------------------------------------------
  # /hello — rota de exemplo
  # ---------------------------------------------------------------------------
  - uri: /hello
    name: rota-exemplo
    methods: [GET]
    upstream_id: upstream-local
    plugins:
      serverless-pre-function:
        phase: rewrite
        functions:
          - |
            return function(conf, ctx)
              ngx.status = 200
              ngx.header["Content-Type"] = "text/plain"
              ngx.say("Hello from APISIX Standalone!")
              ngx.exit(200)
            end
 
  # ---------------------------------------------------------------------------
  # /httpbin/* — proxy reverso para httpbin.org (teste de roteamento)
  # Acesse: https://<seu-app>.onrender.com/httpbin/get
  # ---------------------------------------------------------------------------
  - uri: /httpbin/*
    name: rota-httpbin
    methods: [GET, POST]
    plugins:
      proxy-rewrite:
        regex_uri: ["^/httpbin/(.*)", "/$1"]
    upstream_id: upstream-httpbin
 
upstreams:
  - id: upstream-local
    name: local-dummy
    type: roundrobin
    nodes:
      "127.0.0.1:9080": 1
 
  - id: upstream-httpbin
    name: httpbin
    type: roundrobin
    nodes:
      "httpbin.org:80": 1
 
#END
