# =============================================================================
# Arquivo: apisix_conf/config.yaml
# Descrição: APISIX em modo standalone (data_plane + config_provider: yaml).
#             Sem etcd. Rotas definidas em apisix.yaml.
# =============================================================================

apisix:
  node_listen: 9080
  enable_ipv6: false
  # Status API — porta dedicada para healthcheck (separada do tráfego)
  # Endpoints: GET :7085/status  e  GET :7085/status/ready
  status:
    ip: 0.0.0.0   # 0.0.0.0 para acessar de fora do container
    port: 7085

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml

plugins:
  - real-ip
  - request-id
  - fault-injection
  - cors
  - ip-restriction
  - uri-blocker
  - request-validation
  - basic-auth
  - jwt-auth
  - key-auth
  - proxy-rewrite
  - api-breaker
  - limit-conn
  - limit-count
  - limit-req
  - gzip
  - traffic-split
  - redirect
  - response-rewrite
  - public-api
  - prometheus
  - http-logger
  - file-logger
  - serverless-pre-function
  - serverless-post-function

nginx_config:
  error_log: /dev/stderr
  error_log_level: warn
  access_log: /dev/stdout
  http:
    enable_access_log: true
    access_log_format: >-
      {"time":"$time_iso8601","remote_addr":"$remote_addr",
      "method":"$request_method","uri":"$request_uri",
      "status":"$status","request_time":"$request_time"}
    access_log_format_escape: json
