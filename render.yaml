# =============================================================================
# Arquivo: render.yaml
# Blueprint do Render.com para deploy do APISIX standalone.
# =============================================================================

services:
  - type: web
    name: apisix-gateway
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
  
    port: 9080

    envVars:
      - key: APISIX_STAND_ALONE
        value: "true"

    healthCheckPath: /health
    autoDeploy: true
