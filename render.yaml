services:
  - type: web
    name: apisix-gateway
    runtime: docker
    repo: https://github.com/SEU_USUARIO/SEU_REPOSITORIO
    plan: free
    
    docker:
      dockerfilePath: ./Dockerfile
      dockerContext: .
    
    envVars:
      - key: APISIX_STAND_ALONE
        value: "true"
    
    healthCheck:
      path: /health
      port: 9080
    
    autoDeploy: true
