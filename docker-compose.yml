# =============================================================================
# Arquivo: docker-compose.yml
# Ambiente local — APISIX standalone (sem etcd).
#
# Uso:
#   docker compose up --build -d
#   docker compose logs -f
#   docker compose down
#
# Testar após subir:
#   curl http://localhost:7085/status        → {"status":"ok"}
#   curl http://localhost:7085/status/ready  → {"status":"ok"}
#   curl http://localhost:9080/hello         → Hello from APISIX Standalone!
#   curl http://localhost:9080/httpbin/get   → resposta do httpbin.org
# =============================================================================

services:
  apisix:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apisix-gateway
    restart: unless-stopped
    ports:
      - "9080:9080"   # tráfego HTTP (porta principal)
      - "7085:7085"   # Status API auxiliar
      - "9443:9443"   # HTTPS (opcional)
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix_conf/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
